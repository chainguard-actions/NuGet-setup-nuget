name: Test setup-nuget semver range
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          nuget-version: '5.x'
      - name: Assert nuget-version output is in 5.x range
        env:
          NUGET_VERSION: ${{ steps.setup.outputs.nuget-version }}
        run: |
          echo "nuget-version output: $NUGET_VERSION"
          if [ -z "$NUGET_VERSION" ]; then
            echo "FAIL: nuget-version output is empty"
            exit 1
          fi
          if echo "$NUGET_VERSION" | grep -qE "^5\."; then
            echo "PASS: nuget version $NUGET_VERSION is in 5.x range"
          else
            echo "FAIL: expected a 5.x version, got: $NUGET_VERSION"
            exit 1
          fi
      - name: Assert NUGET env var points to nuget.exe
        run: |
          echo "NUGET env var: $NUGET"
          if [ -z "$NUGET" ]; then
            echo "FAIL: NUGET env var is not set"
            exit 1
          fi
          if [ ! -f "$NUGET" ]; then
            echo "FAIL: nuget.exe not found at $NUGET"
            exit 1
          fi
          echo "PASS: nuget.exe exists at $NUGET"
      - name: Assert nuget script is on PATH
        run: |
          echo "Checking nuget is on PATH..."
          if ! command -v nuget >/dev/null 2>&1; then
            echo "FAIL: nuget command not found on PATH"
            exit 1
          fi
          echo "PASS: nuget found at $(command -v nuget)"
