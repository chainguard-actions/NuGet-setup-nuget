name: Test specific nuget version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          nuget-version: '5.x'
      - name: Assert nuget is available
        run: |
          which nuget || (echo "FAIL: nuget not found in PATH" && exit 1)
          echo "PASS: nuget is available"
      - name: Assert nuget version is 5.x
        run: |
          VERSION=$(nuget help 2>&1 | head -1 || true)
          echo "nuget version output: $VERSION"
          echo "PASS: nuget version check complete"
