name: Test specific nuget version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          nuget-version: '5.x'
      - name: Assert nuget is installed
        run: |
          which nuget || (echo "FAIL: nuget not found in PATH" && exit 1)
          echo "PASS: nuget is installed"
      - name: Assert nuget version is 5.x
        run: |
          VERSION=$(nuget help 2>&1 | head -1 | grep -oP '\d+\.\d+\.\d+' | head -1 || true)
          echo "actual version: $VERSION"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" != "5" ]; then
            echo "FAIL: expected major version 5, got $MAJOR"
            exit 1
          fi
          echo "PASS: nuget version is 5.x"
