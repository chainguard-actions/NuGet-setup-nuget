name: Test specific nuget version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          nuget-version: '5.11.0'
      - name: Assert nuget is available and correct version
        run: |
          which nuget || (echo "FAIL: nuget not found in PATH" && exit 1)
          VERSION=$(nuget help 2>&1 | head -1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "actual version: $VERSION"
          if [ "$VERSION" != "5.11.0" ]; then
            echo "FAIL: expected version 5.11.0, got $VERSION"
            exit 1
          fi
          echo "PASS: nuget version is 5.11.0"
