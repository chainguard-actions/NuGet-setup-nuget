name: Test setup-nuget with API key and source
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TOOL_CACHE: /opt/hostedtoolcache
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare runner directories
        run: |
          mkdir -p /opt/hostedtoolcache
          mkdir -p /tmp/runner-temp
      - name: Install mono (required for nuget SetApiKey on Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mono-complete
      - id: setup-nuget
        uses: .
        with:
          nuget-version: 'latest'
          nuget-api-key: 'test-api-key-67890'
          nuget-api-key-source: 'https://api.nuget.org/v3/index.json'
      - name: Assert nuget-version output is set
        env:
          ACTUAL: ${{ steps.setup-nuget.outputs.nuget-version }}
        run: |
          echo "nuget-version output: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: nuget-version output is empty"
            exit 1
          fi
          echo "PASS: nuget installed with API key and source, version: $ACTUAL"
